<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WELLDONE OPERATOR — 儀表板入口</title>
<style>
  :root{--bg:#05060a;--card:rgba(18,20,28,.7);--line:rgba(255,255,255,.09);--txt:#e6eaf2;--dim:#8b93a6;--accent:#ff8a3c}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:
    radial-gradient(60% 50% at 50% 0%,rgba(60,40,110,.35),transparent 70%),
    radial-gradient(50% 40% at 80% 90%,rgba(20,70,110,.25),transparent 70%),var(--bg);
    color:var(--txt);font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    padding:48px 20px 64px}
  header{text-align:center;margin-bottom:40px}
  h1{font-size:26px;letter-spacing:.04em;display:flex;gap:12px;align-items:center;justify-content:center}
  .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#ff5a5a);box-shadow:0 0 20px rgba(255,138,60,.6)}
  header p{color:var(--dim);font-size:13px;margin-top:10px;letter-spacing:.06em}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:22px;max-width:1180px;margin:0 auto}
  a.card{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);
    border-radius:16px;overflow:hidden;backdrop-filter:blur(14px);transition:.18s;box-shadow:0 10px 40px rgba(0,0,0,.45)}
  a.card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 16px 50px rgba(255,138,60,.18)}
  .thumb{aspect-ratio:16/9;background:#000;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .body{padding:16px 18px}
  .body h2{font-size:17px;margin-bottom:4px}
  .body .en{color:var(--dim);font-size:12px;letter-spacing:.12em;text-transform:uppercase}
  .body p{color:var(--dim);font-size:12.5px;line-height:1.5;margin-top:8px}
  .go{margin-top:12px;display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);font-weight:600}
  footer{text-align:center;color:var(--dim);font-size:11px;margin-top:40px;letter-spacing:.08em}
</style>
</head>
<body>
  <header>
    <h1><span class="logo"></span>WELLDONE OPERATOR</h1>
    <p>AI 公司儀表板 · 三種視覺化風格</p>
  </header>
  <div class="grid">
    <a class="card" href="ai-company-dashboard-galaxy.html">
      <div class="thumb"><img src="shots/galaxy.png" alt="宇宙圖"></div>
      <div class="body"><div class="en">Galaxy</div><h2>🌌 宇宙圖</h2>
        <p>旋渦星系 + 5 顆黑洞 + 全節點運輸連線，水平轉盤旋轉。</p>
        <span class="go">開啟 →</span></div>
    </a>
    <a class="card" href="ai-company-dashboard-ultra.html">
      <div class="thumb"><img src="shots/ultra.png" alt="神經元"></div>
      <div class="body"><div class="en">Neuron</div><h2>🧠 神經元</h2>
        <p>發光叢集 + 絲線連結，暖冷色呼吸切換。</p>
        <span class="go">開啟 →</span></div>
    </a>
    <a class="card" href="ai-company-dashboard-hifi.html">
      <div class="thumb"><img src="shots/hifi.png" alt="粒子圖"></div>
      <div class="body"><div class="en">Particle</div><h2>✨ 粒子圖</h2>
        <p>力導向節點網，真 Bloom 發光。</p>
        <span class="go">開啟 →</span></div>
    </a>
  </div>
  <footer>純前端單檔 · three.js · 建議桌面 Chrome 開啟</footer>
</body>
</html>
